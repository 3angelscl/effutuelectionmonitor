<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — Election Monitor</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f9fafb; }
    .card { text-align: center; padding: 2rem; background: white; border-radius: 1rem; border: 1px solid #e5e7eb; max-width: 400px; }
    h1 { font-size: 1.25rem; color: #111827; margin-bottom: 0.5rem; }
    p { color: #6b7280; font-size: 0.875rem; }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p>Your changes are being saved locally and will sync automatically when your connection is restored.</p>
  </div>
</body>
</html>
